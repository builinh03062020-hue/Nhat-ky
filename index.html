<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Diary ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Cấu hình mặc định toàn cục */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Nunito', sans-serif; 
        }
        
        /* Giao diện nền vũ trụ */
        body {
            background: #090514;
            background-image: radial-gradient(circle at top right, #1a0b2e, transparent 60%),
                              radial-gradient(circle at bottom left, #1a0b2e, transparent 60%);
            color: #2a1c40; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        /* Hiệu ứng hạt sao */
        .stars { position: absolute; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star {
            position: absolute; 
            background: #ffffff;
            border-radius: 50%;
            animation: floatUp infinite linear; 
            box-shadow: 0 0 8px #ffffff, 0 0 15px rgba(255, 255, 255, 0.8);
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Khung bố cục chính: Thiết lập kích thước cố định tuyệt đối */
        .container {
            position: relative; 
            z-index: 1; 
            display: flex; 
            gap: 30px;
            width: 95%; 
            max-width: 1200px; 
            height: 85vh; /* Giữ nguyên chiều cao cố định */
            min-height: 600px;
        }

        /* Khu vực bảng điều khiển: Vô hiệu hóa khả năng tràn nội dung */
        .box {
            background: rgba(235, 235, 240, 0.95);
            border-radius: 25px; 
            padding: 25px 35px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,1);
            display: flex; 
            flex-direction: column; 
            position: relative;
            height: 100%; /* Chiếm 100% chiều cao của container */
            overflow: hidden; /* Ngăn chặn nội dung tràn ra ngoài viền bảng */
        }
        
        .writer-section { flex: 1.2; } 
        
        /* Định dạng tiêu đề */
        h1.cursive-title {
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 48px; 
            font-weight: 600;
            color: #2a1c40; 
            text-align: center; 
            margin-bottom: 0px; 
            letter-spacing: 1px;
            flex-shrink: 0; /* Không cho phép thu nhỏ tiêu đề */
        }

        .star-divider {
            display: flex; align-items: center; text-align: center; color: #2a1c40; margin: 10px 0;
            flex-shrink: 0;
        }
        .star-divider::before, .star-divider::after {
            content: ''; flex: 1; border-bottom: 1.5px solid #2a1c40;
        }
        .star-divider span { font-size: 20px; margin: 0 10px; position: relative; top: -1px; }

        /* Khu vực nhập liệu cấu trúc phân cấp linh hoạt (Flexbox Layout) */
        .input-area {
            flex: 1; /* Chiếm toàn bộ không gian còn lại của bảng viết */
            background: rgba(255, 255, 255, 0.6); 
            border-radius: 20px; 
            padding: 20px;
            margin-bottom: 15px; 
            margin-top: 5px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            min-height: 0; /* Thuộc tính cốt lõi: Ngăn chặn Flex item mở rộng vô hạn */
        }
        
        input.title-input {
            background: transparent; border: none; border-bottom: 1px dashed #9b8cae;
            padding-bottom: 8px; color: #2a1c40; font-size: 18px; font-weight: bold; outline: none;
            flex-shrink: 0;
        }
        input.title-input::placeholder { color: #887a9e; font-weight: normal; font-size: 16px; }
        
        /* Trình soạn thảo văn bản: Tích hợp giới hạn khung và ngắt dòng chuỗi ký tự */
        .editor-area {
            flex: 1; 
            background: transparent; 
            border: none; 
            color: #2a1c40; 
            font-size: 17px; 
            outline: none; 
            overflow-y: auto; /* Kích hoạt thanh cuộn dọc bên trong trình soạn thảo */
            line-height: 1.6; 
            word-wrap: break-word; /* Ép buộc xuống dòng khi chạm lề khung */
            word-break: break-word; /* Xử lý bẻ gãy các chuỗi ký tự dài không chứa khoảng trắng */
            overflow-wrap: anywhere; /* Chuẩn mới nhất cho việc ngắt từ */
            padding-right: 5px; /* Tạo khoảng trống tránh văn bản dính sát thanh cuộn */
        }
        
        .editor-area:empty:before {
            content: attr(placeholder); color: #6a5a82; font-weight: 500; cursor: text;
        }
        
        /* Tùy chỉnh hiển thị thanh cuộn */
        .editor-area::-webkit-scrollbar, .reader-section::-webkit-scrollbar, .modal-content::-webkit-scrollbar { 
            width: 5px; 
        }
        .editor-area::-webkit-scrollbar-thumb, .reader-section::-webkit-scrollbar-thumb, .modal-content::-webkit-scrollbar-thumb { 
            background: #b0a3c7; 
            border-radius: 10px; 
        }

        .editor-area img, .modal-body-content img {
            max-width: 100%; height: auto; border-radius: 12px; margin: 15px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15); display: block;
        }

        /* Nút xác nhận lưu trữ */
        button.submit-btn {
            background: linear-gradient(to bottom, #111, #2a1c40, #111);

            font-family
