<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Diary ✨</title>
    <!-- Phông chữ Great Vibes uốn lượn -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        
        /* NỀN VŨ TRỤ */
        body {
            background: #090514;
            background-image: radial-gradient(circle at top right, #1a0b2e, transparent 60%),
                              radial-gradient(circle at bottom left, #1a0b2e, transparent 60%);
            color: #2a1c40; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* ----- HIỆU ỨNG SAO MỚI (TO, RÕ VÀ SÁNG HƠN) ----- */
        .stars { position: absolute; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star {
            position: absolute; 
            background: #ffffff; /* Màu trắng tinh */
            border-radius: 50%;
            animation: floatUp infinite linear; 
            /* Thêm vầng hào quang phát sáng xung quanh ngôi sao */
            box-shadow: 0 0 8px #ffffff, 0 0 15px rgba(255, 255, 255, 0.8);
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            15% { opacity: 1; } /* Sáng lên rất nhanh */
            85% { opacity: 1; } /* Giữ độ sáng lâu hơn trong lúc bay */
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* KHUNG CHÍNH */
        .container {
            position: relative; z-index: 1; display: flex; gap: 30px;
            width: 95%; max-width: 1050px; height: 85vh;
        }

        /* BẢNG GIẤY */
        .box {
            background: rgba(235, 235, 240, 0.95);
            border-radius: 25px; padding: 35px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,1);
            display: flex; flex-direction: column; position: relative;
        }
        
        .writer-section { flex: 1; }
        
        h1.cursive-title {
            font-family: 'Great Vibes', cursive; font-size: 55px; font-weight: normal;
            color: #2a1c40; text-align: center; margin-bottom: 0px; letter-spacing: 2px;
        }

        .star-divider {
            display: flex; align-items: center; text-align: center; color: #2a1c40; margin: 10px 0;
        }
        .star-divider::before, .star-divider::after {
            content: ''; flex: 1; border-bottom: 1.5px solid #2a1c40;
        }
        .star-divider span { font-size: 20px; margin: 0 10px; position: relative; top: -1px; }

        .input-area {
            flex: 1; background: rgba(255, 255, 255, 0.6); border-radius: 20px; padding: 25px;
            margin-bottom: 20px; margin-top: 10px; display: flex; flex-direction: column; gap: 15px;
        }
        input.title-input {
            background: transparent; border: none; border-bottom: 1px dashed #9b8cae;
            padding-bottom: 8px; color: #2a1c40; font-size: 18px; font-weight: bold; outline: none;
        }
        input.title-input::placeholder { color: #887a9e; font-weight: normal; font-size: 16px; }
        textarea {
            flex: 1; background: transparent; border: none; color: #2a1c40; font-size: 17px; outline: none; resize: none; line-height: 1.6;
        }
        textarea::placeholder { color: #6a5a82; font-weight: 500; }

        button.submit-btn {
            background: linear-gradient(to bottom, #111, #2a1c40, #111);
            color: white; border: none; border-radius: 40px; padding: 10px; width: 100%; cursor: pointer;
            font-family: 'Great Vibes', cursive; font-size: 32px; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: transform 0.2s; margin-bottom: 15px;
        }
        button.submit-btn:hover { transform: scale(1.02); }

        .bottom-actions {
            display: flex; justify-content: space-around; align-items: center;
            border: 1.5px dashed #9b8cae; border-radius: 15px; padding: 10px;
        }
        .action-btn { background: transparent; border: none; cursor: pointer; transition: transform 0.2s; }
        .action-btn:hover { transform: scale(1.1); }
        .action-btn svg { width: 26px; height: 26px; fill: #2a1c40; }

        /* CỘT PHẢI */
        .reader-section { flex: 1; overflow-y: auto; padding-right: 15px; display: flex; flex-direction: column; gap: 5px; }
        .reader-section::-webkit-scrollbar { width: 4px; }
        .reader-section::-webkit-scrollbar-thumb { background: #b0a3c7; border-radius: 10px; }

        .entry-item { width: 100%; }
        
        .entry-header-row {
            display: flex; align-items: center; gap: 20px; cursor: pointer; transition: 0.2s; padding-left: 10px;
        }
        .entry-header-row:hover { transform: translateX(5px); }
        
        .planet-icon { width: 55px; height: 55px; flex-shrink: 0; }
        .entry-date { font-size: 18px; font-weight: 600; letter-spacing: 1px; color: #4a3b69;}
        
        .list-divider {
            display: flex; align-items: center; text-align: center; color: #2a1c40; margin-top: -10px; margin-bottom: 15px;
        }
        .list-divider::before, .list-divider::after {
            content: ''; flex: 1; border-bottom: 1px solid #2a1c40;
        }
        .list-divider span { font-size: 16px; margin: 0 10px; position: relative; top: -1px; }

        .entry-body {
            display: none; padding: 15px 20px; background: rgba(255,255,255,0.7);
            border-radius: 15px; margin: 0 0 20px 20px; border-left: 2px solid #2a1c40;
            animation: fadeIn 0.3s ease; position: relative;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        .entry-body-title { font-weight: bold; margin-bottom: 5px; font-size: 17px; }
        .entry-body-content { white-space: pre-wrap; font-size: 16px; line-height: 1.6; }
        
        .delete-btn {
            position: absolute; top: 10px; right: 15px; background: transparent; border: none; color: #d63031;
            font-size: 15px; cursor: pointer; font-weight: bold;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; min-height: 95vh; overflow-y: auto; padding: 15px 0;}
            .box { padding: 25px; }
            .writer-section { flex: none; height: 80vh; }
            .reader-section { flex: none; min-height: 60vh; overflow: visible;}
        }
    </style>
</head>
<body>

    <!-- Sao nền -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <!-- BẢNG TRÁI -->
        <div class="box writer-section">
            <h1 class="cursive-title">Dear diary</h1>
            <div class="star-divider"><span>✦</span></div>

            <div class="input-area">
                <input type="text" id="title" class="title-input" placeholder="Tiêu đề...">
                <textarea id="content" placeholder="Hôm nay công chúa có tâm sự gì vậy?"></textarea>
            </div>

            <button class="submit-btn" onclick="saveDiary()" id="saveBtn">To star holder</button>

            <!-- Công cụ -->
            <div class="bottom-actions">
                <button class="action-btn" onclick="backupDiary()" title="Tải file về máy">
                    <svg viewBox="0 0 24 24"><path d="M19 2H8C6.9 2 6 2.9 6 4V20C6 21.1 6.9 22 8 22H20C21.1 22 22 21.1 22 20V5L19 2ZM18 20H10V16H18V20ZM16 8H10V4H16V8Z"/></svg>
                </button>
                <button class="action-btn" onclick="document.getElementById('fileInput').click()" title="Mở file cũ">
                    <svg viewBox="0 0 24 24"><path d="M20 6H16V4C16 2.9 15.1 2 14 2H10C8.9 2 8 2.9 8 4V6H4C2.9 6 2 6.9 2 8V19C2 20.1 2.9 21 4 21H20C21.1 21 22 20.1 22 19V8C22 6.9 21.1 6 20 6ZM10 4H14V6H10V4ZM20 19H4V8H20V19Z"/><rect x="10" y="11" width="4" height="2"/></svg>
                </button>
                <input type="file" id="fileInput" style="display: none;" accept=".json" onchange="restoreDiary(event)">
            </div>
        </div>

        <!-- BẢNG PHẢI -->
        <div class="box reader-section" id="diaryList"></div>
    </div>

    <script>
        // ----- CODE TẠO SAO ĐÃ ĐƯỢC NÂNG CẤP -----
        const starsContainer = document.getElementById('stars');
        
        // Tăng từ 60 lên 150 hạt sao
        for (let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            
            // Vị trí ngẫu nhiên
            star.style.left = Math.random() * 100 + 'vw';
            
            // Kích thước to hơn: random từ 2px đến 7px (Hạt to hạt nhỏ xen kẽ)
            let size = Math.random() * 5 + 2 + 'px';
            star.style.width = size;
            star.style.height = size;
            
            // Tốc độ bay ngẫu nhiên
            star.style.animationDuration = Math.random() * 8 + 5 + 's';
            star.style.animationDelay = Math.random() * 5 + 's';
            
            starsContainer.appendChild(star);
        }

        // SVG QUẢ TÁO MÀU TÍM ĐEN
        const planetSVG = `
        <svg class="planet-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="50" cy="50" rx="35" ry="9" fill="none" stroke="#2a1c40" stroke-width="1" transform="rotate(-15 50 50)" />
            <ellipse cx="50" cy="50" rx="35" ry="9" fill="none" stroke="#2a1c40" stroke-width="1" transform="rotate(15 50 50)" />
            <circle cx="20" cy="42" r="1.5" fill="#2a1c40" />
            <circle cx="80" cy="58" r="1.5" fill="#2a1c40" />
            <path d="M50 65 C 35 65, 35 42, 50 38 C 65 42, 65 65, 50 65 Z" fill="#2a1c40"/>
            <path d="M50 38 Q 52 30 55 32" fill="none" stroke="#2a1c40" stroke-width="2"/>
        </svg>`;

        // LOGIC DỮ LIỆU NHẬT KÝ
        let entries = [];
        try { entries = JSON.parse(localStorage.getItem('princessDiaryFinal')) || []; } 
        catch(e) { entries = []; }

        const diaryList = document.getElementById('diaryList');

        function renderDiaries() {
            diaryList.innerHTML = '';
            [...entries].reverse().forEach((entry, index) => {
                const realIndex = entries.length - 1 - index; 
                const entryDiv = document.createElement('div');
                entryDiv.className = 'entry-item';
                
                entryDiv.innerHTML = `
                    <div class="entry-header-row" onclick="toggleEntry(${realIndex})">
                        ${planetSVG}
                        <div class="entry-date">${entry.date}</div>
                    </div>
                    
                    <div class="entry-body" id="entry-${realIndex}">
                        <button class="delete-btn" onclick="deleteDiary(${realIndex})" title="Xóa bỏ">✖</button>
                        <div class="entry-body-title">${entry.title || 'Ký ức vụn vặt'}</div>
                        <div class="entry-body-content">${entry.content}</div>
                    </div>

                    <div class="list-divider"><span>✦</span></div>
                `;
                diaryList.appendChild(entryDiv);
            });
        }

        function toggleEntry(index) {
            const body = document.getElementById(`entry-${index}`);
            if(body.style.display === 'block') {
                body.style.display = 'none';
            } else {
                document.querySelectorAll('.entry-body').forEach(el => el.style.display = 'none');
                body.style.display = 'block';
            }
        }

        function saveDiary() {
            const titleInput = document.getElementById('title');
            const contentInput = document.getElementById('content');
            if (!contentInput.value.trim()) return alert('Công chúa chưa viết gì cả! ✨');

            const now = new Date();
            const dateString = String(now.getDate()).padStart(2, '0') + '/' + 
                               String(now.getMonth() + 1).padStart(2, '0') + '/' + 
                               now.getFullYear();

            entries.push({ title: titleInput.value, content: contentInput.value, date: dateString });
            localStorage.setItem('princessDiaryFinal', JSON.stringify(entries));

            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saved ✨";
            setTimeout(() => btn.innerText = "To star holder", 2000);

            titleInput.value = ''; contentInput.value = '';
            renderDiaries();
        }

        function deleteDiary(index) {
            if(confirm('Xóa dòng ký ức này nhé? 🥀')) {
                entries.splice(index, 1);
                localStorage.setItem('princessDiaryFinal', JSON.stringify(entries));
                renderDiaries();
            }
        }

        function backupDiary() {
            if (entries.length === 0) return alert("Chưa có ký ức nào để tải về!");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "nhat_ky_cong_chua.json");
            document.body.appendChild(dl);
            dl.click(); dl.remove();
        }

        function restoreDiary(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        entries = importedData;
                        localStorage.setItem('princessDiaryFinal', JSON.stringify(entries));
                        renderDiaries();
                        alert("Đã khôi phục ký ức thành công! ✨");
                    } else alert("File không đúng định dạng!");
                } catch (error) { alert("Có lỗi xảy ra khi đọc file!"); }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        renderDiaries();
    </script>
</body>
</html>
